name: Flight scan

# Se ejecuta lunes y jueves a las 07:00 UTC (~09:00 hora peninsular en verano).
# También se puede lanzar a mano desde la pestaña "Actions" de GitHub.
on:
  schedule:
    - cron: "0 7 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write  # para poder subir docs/index.html actualizado

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Escanear vuelos y enviar email
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scan_job.py

      - name: Publicar la página actualizada
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/index.html price_history.json
          if git diff --staged --quiet; then
            echo "Sin cambios en la página."
          else
            git commit -m "Actualizar vuelos $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
